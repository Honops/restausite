<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <nav class="nav-header">

    <ul class="nav-menu">
      <li><a href="index.html" class="active">Accueil</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="galerie.html">Galerie</a></li>
      <li><a href="reservation.html" class="reserve-btn">Réserver</a></li>
    </ul>

    <div class="logo">
      <img src="assets/images/placeholder/logo.png" alt="Logo Restaurant">
    </div>

  </nav>
</header>

<!-- Hero Section -->
<section class="hero">
  <!-- Texte superposé -->
  <div class="hero-text">
    <h2>Bienvenue au Restaurant</h2>
    <p>Découvrez notre cuisine méditerranéenne.</p>
    <a href="menu.html" class="btn">Voir le menu</a>
  </div>

  <!-- Grande image principale -->
  <div class="hero-main-image">
    <img src="assets/images/hero/main.jpg" alt="Grande image restaurant">
  </div>

  <!-- 4 petites images -->
  <div class="hero-small-images">
    <img src="assets/images/hero/img1.jpg" alt="Plat 1">
    <img src="assets/images/hero/img2.jpg" alt="Plat 2">
    <img src="assets/images/hero/img3.jpg" alt="Plat 3">
    <img src="assets/images/hero/img4.jpg" alt="Plat 4">
  </div>

  <!-- Vidéo 10s autoplay muted loop -->
  <div class="hero-video">
    <video src="assets/videos/hero/video.mp4" autoplay muted loop></video>
  </div>
</section>

<!-- Présentation restaurant -->
<section class="presentation">
  <h2>Notre restaurant</h2>
  <p>Produits frais, cuisine maison et ambiance chaleureuse.</p>
</section>

<!-- Footer -->
<footer>
  <div class="footer-contact">
    <p>Téléphone : <a href="tel:+33123456789">01 23 45 67 89</a></p>
    <p>Email : <a href="mailto:contact@restaurant.com">contact@restaurant.com</a></p>
    <div class="footer-social">
      <a href="https://facebook.com/restaurant" target="_blank">Facebook</a> |
      <a href="https://instagram.com/restaurant" target="_blank">Instagram</a>
    </div>
  </div>
  <p class="footer-copyright">© Restaurant</p>
</footer>

<!-- Scripts -->
<script src="js/firebase-config.js"></script>
<script src="js/main.js" defer></script>

</body>
</html>
