<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Restaurant</title>
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<header>
  <h1>Dashboard Restaurateur</h1>
  <p>Gérez vos plats et vos médias</p>
</header>

<main>
  <section class="add-menu">
    <h2>Ajouter / Modifier un plat</h2>
    <form id="serviceForm">
      <label>Nom du plat</label>
      <input type="text" id="serviceName" placeholder="Ex: Salade César" required>

      <label>Prix (€)</label>
      <input type="number" id="servicePrice" step="0.01" placeholder="10.50" required>

      <label>Catégorie</label>
      <select id="serviceCategory" required>
        <option value="">Choisir</option>
        <option value="entree">Entrée</option>
        <option value="plat">Plat</option>
        <option value="dessert">Dessert</option>
        <option value="promo">Promo</option>
      </select>

      <label>Média</label>
      <input type="file" id="serviceMedia" accept="image/*,video/*" required>

      <label>Type</label>
      <select id="serviceType" required>
        <option value="image">Image</option>
        <option value="video">Vidéo</option>
      </select>

      <button type="submit">Ajouter / Remplacer</button>
    </form>
  </section>

  <section class="current-menu">
    <h2>Menu actuel</h2>
    <div id="menuDashboard">
      <p>Chargement...</p>
    </div>
  </section>
</main>

<script src="../js/firebase-config.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
