<section id="reservation-form">
  <h2>Réservez votre table</h2>

  <form id="reservation">

    <input type="tel" id="phone" placeholder="Téléphone" required>

    <input type="time" id="time" required>
    <button type="submit" class="btn-primary">Réserver</button>
